name: StudyMate AI v2 CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build & Push Images to Registry
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push FastAPI AI Service
      - name: Build & Push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./v2/ai-service
          file: ./v2/ai-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/studymate-ai-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Spring Boot API Gateway
      - name: Build & Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./v2/api-gateway
          file: ./v2/api-gateway/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/studymate-api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push Nginx Frontend Web App
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./v2/frontend
          file: ./v2/frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/studymate-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Continuous Deployment to Cloud VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Execute Remote SSH Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/studymate-ai/v2
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
