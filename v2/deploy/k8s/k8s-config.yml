apiVersion: v1
kind: ConfigMap
metadata:
  name: studymate-config
  namespace: studymate
data:
  REDIS_URL: "redis://redis-service:6379"
  CHROMA_HOST: "chromadb-service"
  CHROMA_PORT: "8000"
  SPRING_REDIS_HOST: "redis-service"
  SPRING_RABBITMQ_HOST: "rabbitmq-service"
  AI_SERVICE_URL: "http://ai-service:8001"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-service:5432/studymate"

